<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt Chart</title>
<style>
  :root {
    --header-bg: #2F5496;
    --header-text: #fff;
    --weekend-bg: #f5f5f5;
    --border: #e0e0e0;
    --cell-h: 26px;
    --cal-w: 22px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    color: #333;
    background: #fafafa;
    padding: 20px 20px 60px;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  h1 {
    color: var(--header-bg);
    font-size: 20px;
  }

  .btn {
    padding: 6px 14px;
    border: none;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-save {
    background: #00B050;
    color: #fff;
  }
  .btn-save:hover { background: #008a3e; }

  .btn-export {
    background: var(--header-bg);
    color: #fff;
  }
  .btn-export:hover { background: #1e3a6e; }

  .save-status {
    font-size: 12px;
    font-weight: 600;
    color: #00B050;
    opacity: 0;
    transition: opacity 0.3s;
    margin-left: 8px;
  }

  .gantt-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    position: relative;
  }

  table {
    border-collapse: collapse;
    white-space: nowrap;
  }

  .month-header {
    background: #D6E4F0;
    color: #2F5496;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  th {
    background: var(--header-bg);
    color: var(--header-text);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 6px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 3;
  }

  th.day-h {
    font-size: 9px;
    font-weight: 400;
    padding: 5px 0;
    min-width: var(--cal-w);
    max-width: var(--cal-w);
    width: var(--cal-w);
  }

  th.day-h.we { background: #1e3a6e; }

  td {
    border-bottom: 1px solid #f0f0f0;
    padding: 3px 6px;
    height: var(--cell-h);
  }

  td.task-id {
    min-width: 36px;
    max-width: 50px;
    text-align: center;
    font-size: 10px;
    color: #888;
    font-family: monospace;
  }

  td.task-name {
    min-width: 260px;
    max-width: 340px;
    font-size: 12px;
    padding-left: 12px;
  }

  td.owner { min-width: 80px; text-align: center; font-size: 11px; color: #444; position: relative; }
  td.person { min-width: 90px; text-align: center; font-size: 11px; color: #555; position: relative; }
  td.date { min-width: 90px; text-align: center; font-size: 11px; font-family: monospace; }
  td.days { min-width: 35px; text-align: center; font-size: 11px; }
  td.effort { min-width: 40px; text-align: center; font-size: 11px; }
  td.prio { min-width: 40px; text-align: center; font-size: 11px; font-weight: 600; }
  td.deps { min-width: 80px; text-align: center; font-size: 10px; color: #555; position: relative; }

  td.status { min-width: 75px; text-align: center; font-size: 11px; font-weight: 600; }
  td.status-on-track { background: #C6EFCE; color: #1a6b1a; }
  td.status-delayed { background: #FFC7CE; color: #8b1a1a; }
  td.status-done { background: #D9E2F3; color: #2F5496; }
  td.status-not-needed { background: #F0F0F0; color: #999; }

  /* Status bar effects */
  tr.task-delayed td.cal.bar { opacity: 0.5; }
  tr.task-not-needed td.cal.bar { opacity: 0.2; }
  tr.task-done td.cal.bar { opacity: 0.6; }
  tr.task-not-needed td.task-name { text-decoration: line-through; color: #999; }
  tr.task-done td.task-name { color: #2F5496; }

  td[contenteditable="true"] {
    cursor: text;
    outline: none;
    transition: background 0.15s;
  }
  td[contenteditable="true"]:hover {
    background: #e8f0fe !important;
  }
  td[contenteditable="true"]:focus {
    background: #d2e3fc !important;
    box-shadow: inset 0 0 0 2px #4285f4;
  }

  td select {
    border: none;
    background: transparent;
    font: inherit;
    text-align: center;
    cursor: pointer;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    padding: 0;
  }
  td select:hover { background: #e8f0fe; }
  td select:focus { background: #d2e3fc; box-shadow: inset 0 0 0 2px #4285f4; }

  td.cal {
    min-width: var(--cal-w);
    max-width: var(--cal-w);
    width: var(--cal-w);
    padding: 0;
    position: relative;
  }

  td.cal.we { background: var(--weekend-bg); }

  tr.cat-row td {
    background: #f8f9fa;
    padding: 6px;
    border-bottom: 2px solid var(--border);
    font-weight: 700;
    font-size: 13px;
  }

  .cat-swatch {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 3px;
    vertical-align: middle;
    margin-right: 6px;
  }

  .vline {
    position: absolute;
    top: 0;
    width: 2px;
    pointer-events: none;
    z-index: 5;
  }

  /* Multi-select dropdown */
  .ms-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    z-index: 20;
    min-width: 120px;
    max-height: 200px;
    overflow-y: auto;
    display: none;
  }
  .ms-dropdown.open { display: block; }
  .ms-dropdown label {
    display: block;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
  }
  .ms-dropdown label:hover { background: #e8f0fe; }
  .ms-dropdown input[type="checkbox"] { margin-right: 6px; vertical-align: middle; }

  .ms-trigger {
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 3px;
    min-height: 20px;
    display: inline-block;
    width: 100%;
  }
  .ms-trigger:hover { background: #e8f0fe; }

  /* SVG dependency overlay */
  #dep-svg {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 4;
  }

  /* Workload section */
  .workload-section {
    margin-top: 24px;
    padding: 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .workload-section h2 {
    font-size: 16px;
    color: var(--header-bg);
    margin-bottom: 12px;
  }

  .wl-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    gap: 8px;
  }

  .wl-name {
    width: 80px;
    font-size: 12px;
    font-weight: 600;
    text-align: right;
  }

  .wl-bar-bg {
    flex: 1;
    height: 22px;
    background: #f0f0f0;
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .wl-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
    display: flex;
    align-items: center;
    padding-left: 8px;
    font-size: 11px;
    font-weight: 600;
    color: #fff;
    min-width: 20px;
  }

  .wl-stats {
    font-size: 11px;
    color: #666;
    width: 140px;
  }

  .legend {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch {
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .info { margin-top: 12px; font-size: 12px; color: #666; }
  .info strong { color: #333; }

  .lines-legend { margin-top: 8px; font-size: 12px; }
  .lines-legend .ll-swatch {
    display: inline-block; width: 20px; height: 3px;
    vertical-align: middle; margin-right: 4px;
  }

  .footer {
    margin-top: 16px; font-size: 11px; color: #999; font-style: italic;
  }

  /* Current Priorities section */
  .priorities-section {
    margin-top: 24px;
    padding: 16px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .priorities-section h2 {
    font-size: 16px;
    color: var(--header-bg);
    margin-bottom: 12px;
  }

  .prio-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .prio-table th {
    background: var(--header-bg);
    color: var(--header-text);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    text-align: left;
    position: static;
  }

  .prio-table td {
    padding: 5px 10px;
    border-bottom: 1px solid #f0f0f0;
    height: auto;
  }

  .prio-table tr:hover td {
    background: #f5f8ff;
  }

  .prio-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 11px;
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1 id="chart-title"></h1>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <button class="btn btn-save" onclick="saveToFile()" title="Save data to a file on disk">&#x1F4BE; Save to File</button>
    <button class="btn btn-export" onclick="downloadJSON()" title="Download current data as JSON">&#x2B07; Download JSON</button>
    <button class="btn" style="background:#888;color:#fff" onclick="resetLocal()" title="Discard browser edits and reload original data">&#x21BA; Reset</button>
    <span class="save-status" id="save-status"></span>
  </div>
</div>

<div class="gantt-wrapper" id="gantt-wrapper">
  <svg id="dep-svg"></svg>
  <table id="gantt-table">
    <thead id="gantt-head"></thead>
    <tbody id="gantt-body"></tbody>
  </table>
</div>

<div class="legend" id="legend"></div>
<div class="info" id="info"></div>
<div class="lines-legend" id="lines-legend"></div>

<div class="workload-section" id="workload-section">

</div>

</div>

// Number of fixed columns before calendar: ID, Task, Owner, Person, Start, Days, Effort, Prio, Deps, Status
const DATA_COLS = 10;

// ═══════════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════════
function parseDate(s) { return new Date(s + 'T00:00:00'); }
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
function isWeekend(d) { return d.getDay() === 0 || d.getDay() === 6; }

function lighten(hex) {
  if (!hex) return '#ddd';
  const h = hex.replace('#','');
  let r = parseInt(h.substring(0,2),16);
  let g = parseInt(h.substring(2,4),16);
  let b = parseInt(h.substring(4,6),16);
  r = Math.min(255, r + Math.floor((255-r)/2));
  g = Math.min(255, g + Math.floor((255-g)/2));
  b = Math.min(255, b + Math.floor((255-b)/2));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// Normalize person field — always return array
function getPersonArray(item) {
  if (!item.person) return [];
  if (Array.isArray(item.person)) return item.person;
  return [item.person];
}

// Build a flat task lookup by ID
function buildTaskMap() {
  const m = {};
  DATA.tasks.forEach(g => g.items.forEach(it => { if (it.id) m[it.id] = it; }));
  return m;
}

// Get all task IDs in order
function allTaskIds() {
  const ids = [];
  DATA.tasks.forEach(g => g.items.forEach(it => { if (it.id) ids.push(it.id); }));
  return ids;
}

// ═══════════════════════════════════════════════════════════════════
// Calendar setup
// ═══════════════════════════════════════════════════════════════════
const calStart = parseDate(DATA.calendar.start);
const calEnd = parseDate(DATA.calendar.end);
const numDays = daysBetween(calStart, calEnd) + 1;
const today = new Date(); today.setHours(0,0,0,0);
const todayOffset = daysBetween(calStart, today);

// ═══════════════════════════════════════════════════════════════════
// Row-to-item mapping for dependency arrows
// ═══════════════════════════════════════════════════════════════════
const rowMap = new Map(); // id -> tr element

// ═══════════════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════════════
function render() {
  document.getElementById('chart-title').textContent = DATA.title;
  renderHead();
  renderBody();
  renderLegend();
  renderWorkload();
  renderCurrentPriorities();
  drawLines();
  drawDependencies();
}

function renderHead() {
  const thead = document.getElementById('gantt-head');
  thead.innerHTML = '';

  // Month row
  const mrow = document.createElement('tr');
  const mblank = document.createElement('th');
  mblank.colSpan = DATA_COLS; mblank.className = 'month-header';
  mrow.appendChild(mblank);

  let curMonth = null, curTh = null;
  for (let d = 0; d < numDays; d++) {
    const dt = addDays(calStart, d);
    const key = dt.toLocaleString('en', {month:'long', year:'numeric'});
    if (key !== curMonth) {
      curTh = document.createElement('th');
      curTh.className = 'month-header';
      curTh.colSpan = 1;
      curTh.textContent = key;
      mrow.appendChild(curTh);
      curMonth = key;
    } else {
      curTh.colSpan++;
    }
  }
  thead.appendChild(mrow);

  // Column headers
  const hrow = document.createElement('tr');
  ['ID', 'Task', 'Owner', 'Person(s)', 'Start', 'Days', 'Effort', 'Prio.', 'Deps', 'Status'].forEach(h => {
    const th = document.createElement('th');
    th.textContent = h;
    hrow.appendChild(th);
  });

  for (let d = 0; d < numDays; d++) {
    const dt = addDays(calStart, d);
    const th = document.createElement('th');
    th.className = 'day-h' + (isWeekend(dt) ? ' we' : '');
    th.textContent = dt.getDate();
    th.title = fmtDate(dt);
    hrow.appendChild(th);
  }
  thead.appendChild(hrow);
}

      // 4. Person(s) (multi-select)

      buildMultiSelect(tdPerson, DATA.people, getPersonArray(item), (sel) => {
        item.person = sel;

      // 5. Start date (editable)

      tdStart.contentEditable = 'true';

      tdStart.addEventListener('blur', () => {

        }
      });
      tr.appendChild(tdDays);

      // 7. Effort (dropdown)
      const tdEffort = document.createElement('td');
      tdEffort.className = 'effort';
      const selEffort = document.createElement('select');
      selEffort.innerHTML = ['S','M','L'].map(v =>

      ).join('');
      selEffort.addEventListener('change', () => { item.effort = selEffort.value; saveLocal(); });
      tdEffort.appendChild(selEffort);
      tr.appendChild(tdEffort);

      // 8. Priority (dropdown: H=red, M=yellow, L=green)
      const tdPrio = document.createElement('td');
      const selPrio = document.createElement('select');
      selPrio.innerHTML = ['H','M','L'].map(v =>
        `<option value="${v}" ${v===(item.priority||item.difficulty||'M')?'selected':''}>${v}</option>`
      ).join('');
      const prioColors = { H: ['#FFC7CE','#8b1a1a'], M: ['#FFEB9C','#7a6100'], L: ['#C6EFCE','#1a6b1a'] };
      function updatePrioStyle() {
        const c = prioColors[selPrio.value] || ['transparent','#333'];

        tdPrio.style.color = c[1];

      }

      tdPrio.appendChild(selPrio);

      // 9. Dependencies (multi-select of task IDs)
      const tdDeps = document.createElement('td');
      tdDeps.className = 'deps';
      const otherIds = allTaskIds().filter(id => id !== item.id);
      buildMultiSelect(tdDeps, otherIds, item.depends_on || [], (sel) => {
        item.depends_on = sel;
        saveLocal();
        drawDependencies();
      });
      tr.appendChild(tdDeps);

      // 10. Status (dropdown)
      const tdStatus = document.createElement('td');
      const selStatus = document.createElement('select');
      const statusOpts = [
        ['on-track', 'On Track'],
        ['delayed', 'Delayed'],
        ['done', 'Done'],
        ['not-needed', 'Not Needed']
      ];
      selStatus.innerHTML = statusOpts.map(([v, label]) =>
        `<option value="${v}" ${v===(item.status||'on-track')?'selected':''}>${label}</option>`
      ).join('');
      function updateStatusStyle() {
        tdStatus.className = 'status status-' + (selStatus.value || 'on-track');

// ═══════════════════════════════════════════════════════════════════
// Multi-select dropdown builder
// ═══════════════════════════════════════════════════════════════════
function buildMultiSelect(td, options, selected, onChange) {
  const trigger = document.createElement('span');
  trigger.className = 'ms-trigger';
  trigger.textContent = selected.length ? selected.join(', ') : '—';
  td.appendChild(trigger);

  const dropdown = document.createElement('div');
  dropdown.className = 'ms-dropdown';

  options.forEach(opt => {
    const label = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = opt;
    cb.checked = selected.includes(opt);
    cb.addEventListener('change', () => {
      const sel = [];
      dropdown.querySelectorAll('input[type=checkbox]:checked').forEach(c => sel.push(c.value));
      trigger.textContent = sel.length ? sel.join(', ') : '—';
      onChange(sel);
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(opt));
    dropdown.appendChild(label);
  });

  td.appendChild(dropdown);

  trigger.addEventListener('click', (e) => {
    e.stopPropagation();
    // Close all other open dropdowns
    document.querySelectorAll('.ms-dropdown.open').forEach(d => { if (d !== dropdown) d.classList.remove('open'); });
    dropdown.classList.toggle('open');
  });

  // Prevent clicks inside dropdown from closing it
  dropdown.addEventListener('click', (e) => e.stopPropagation());
}

// Close dropdowns when clicking outside
document.addEventListener('click', () => {
  document.querySelectorAll('.ms-dropdown.open').forEach(d => d.classList.remove('open'));
});

// ═══════════════════════════════════════════════════════════════════
// Calendar bar rendering
// ═══════════════════════════════════════════════════════════════════
function renderCalRow(tr, item, cat, color) {
  while (tr.children.length > DATA_COLS) tr.removeChild(tr.lastChild);

  const startDt = parseDate(item.start);
  const endDt = addDays(startDt, item.days);
  const isDelivery = cat === 'Hardware Deliveries';
  const waitColor = lighten(color);

  for (let d = 0; d < numDays; d++) {
    const dt = addDays(calStart, d);
    const td = document.createElement('td');
    td.className = 'cal';
    if (isWeekend(dt)) td.classList.add('we');
    if (dt >= startDt && dt < endDt) {
      td.classList.add('bar');
      const progress = daysBetween(startDt, dt) / item.days;
      if (isDelivery && progress < 0.7) {
        td.style.background = waitColor;
      } else {
        td.style.background = color;
      }
    }
    tr.appendChild(td);
  }
}

// ═══════════════════════════════════════════════════════════════════
// Dependency arrows (SVG overlay)
// ═══════════════════════════════════════════════════════════════════
function drawDependencies() {
  const svg = document.getElementById('dep-svg');
  const wrapper = document.getElementById('gantt-wrapper');
  const table = document.getElementById('gantt-table');

  svg.innerHTML = '';
  svg.setAttribute('width', table.offsetWidth);
  svg.setAttribute('height', table.offsetHeight);

  // Arrowhead marker
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'arrowhead');
  marker.setAttribute('markerWidth', '8');
  marker.setAttribute('markerHeight', '6');
  marker.setAttribute('refX', '8');
  marker.setAttribute('refY', '3');
  marker.setAttribute('orient', 'auto');
  const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  poly.setAttribute('points', '0 0, 8 3, 0 6');
  poly.setAttribute('fill', '#666');
  marker.appendChild(poly);
  defs.appendChild(marker);
  svg.appendChild(defs);

  const thead = table.querySelector('thead');
  const headerCells = thead.querySelectorAll('tr:last-child th');
  const wrapperRect = wrapper.getBoundingClientRect();

  const taskMap = buildTaskMap();

  // Get the left edge of the calendar area to clamp arrows
  const firstCalIdx = DATA_COLS;
  const firstCalCell = headerCells[firstCalIdx];
  const calLeftX = firstCalCell ? (firstCalCell.getBoundingClientRect().left - wrapperRect.left + wrapper.scrollLeft) : 0;

  DATA.tasks.forEach(group => {
    group.items.forEach(item => {
      if (!item.depends_on || !item.depends_on.length || !item.id) return;
      const succTr = rowMap.get(item.id);
      if (!succTr) return;

      item.depends_on.forEach(depId => {
        const predItem = taskMap[depId];
        const predTr = rowMap.get(depId);
        if (!predItem || !predTr) return;

        // Find bar positions
        const predEnd = getBarEndX(predItem, headerCells, wrapperRect, wrapper);
        const succStart = getBarStartX(item, headerCells, wrapperRect, wrapper);
        const predY = getRowMidY(predTr, wrapperRect, wrapper);
        const succY = getRowMidY(succTr, wrapperRect, wrapper);

        if (predEnd === null || succStart === null) return;

        // Draw right-angle connector with clamped routing
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const gap = 6; // small gap from bar edge
        let d;

        if (predEnd + gap < succStart) {
          // Normal case: predecessor ends before successor starts
          const midX = Math.max((predEnd + succStart) / 2, calLeftX);
          d = `M ${predEnd} ${predY} L ${midX} ${predY} L ${midX} ${succY} L ${succStart} ${succY}`;
        } else {
          // Overlap case: route below/above to avoid crossing bars
          const detourX = Math.max(Math.min(predEnd, succStart) - 12, calLeftX);
          d = `M ${predEnd} ${predY} L ${predEnd + gap} ${predY} L ${predEnd + gap} ${Math.max(predY, succY) + 14} L ${detourX} ${Math.max(predY, succY) + 14} L ${detourX} ${succY} L ${succStart} ${succY}`;
        }

        path.setAttribute('d', d);
        path.setAttribute('stroke', '#666');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('marker-end', 'url(#arrowhead)');
        path.setAttribute('opacity', '0.7');
        svg.appendChild(path);
      });
    });
  });
}

function getBarEndX(item, headerCells, wrapperRect, wrapper) {
  const startDt = parseDate(item.start);
  const endOffset = daysBetween(calStart, addDays(startDt, item.days)) - 1;
  const idx = DATA_COLS + endOffset;
  if (idx < 0 || idx >= headerCells.length) return null;
  const cell = headerCells[idx];
  const rect = cell.getBoundingClientRect();
  return rect.right - wrapperRect.left + wrapper.scrollLeft;
}

function getBarStartX(item, headerCells, wrapperRect, wrapper) {
  const startDt = parseDate(item.start);
  const startOffset = daysBetween(calStart, startDt);
  const idx = DATA_COLS + startOffset;
  if (idx < 0 || idx >= headerCells.length) return null;
  const cell = headerCells[idx];
  const rect = cell.getBoundingClientRect();
  return rect.left - wrapperRect.left + wrapper.scrollLeft;
}

function getRowMidY(tr, wrapperRect, wrapper) {
  const rect = tr.getBoundingClientRect();
  return rect.top + rect.height / 2 - wrapperRect.top + wrapper.scrollTop;
}

// ═══════════════════════════════════════════════════════════════════
// Milestone & Today lines
// ═══════════════════════════════════════════════════════════════════
function drawLines() {
  const wrapper = document.getElementById('gantt-wrapper');
  wrapper.querySelectorAll('.vline').forEach(el => el.remove());

  const table = document.getElementById('gantt-table');
  const rows = table.querySelectorAll('thead tr');
  if (rows.length < 2) return;

  const headerCells = rows[1].querySelectorAll('th');
  const wrapperRect = wrapper.getBoundingClientRect();
  const tableH = table.offsetHeight;

  function addLine(offset, color, title) {
    if (offset < 0 || offset >= numDays) return;
    const idx = DATA_COLS + offset;
    if (idx >= headerCells.length) return;
    const cell = headerCells[idx];
    const cellRect = cell.getBoundingClientRect();
    const line = document.createElement('div');
    line.className = 'vline';
    line.style.left = (cellRect.left - wrapperRect.left + wrapper.scrollLeft) + 'px';
    line.style.height = tableH + 'px';
    line.style.background = color;
    line.title = title || '';
    wrapper.appendChild(line);
  }

  // Today
  addLine(todayOffset, '#00B050', 'Today');

  // Milestones
  DATA.milestones.forEach(ms => {
    const msDate = parseDate(ms.date);
    const offset = daysBetween(calStart, msDate);
    addLine(offset, ms.color, ms.label + ' (' + ms.date + ')');
  });
}

// ═══════════════════════════════════════════════════════════════════
// Workload Summary
// ═══════════════════════════════════════════════════════════════════
function renderWorkload() {
  const container = document.getElementById('workload-bars');
  container.innerHTML = '';

  const prioWeight = { H: 3, M: 2, L: 1 };
  const stats = {};

  DATA.people.forEach(p => { stats[p] = { score: 0, tasks: 0, days: 0 }; });

  DATA.tasks.forEach(group => {
    group.items.forEach(item => {
      const persons = getPersonArray(item);
      if (!persons.length) return;
      const d = item.priority || item.difficulty || 'M';
      const w = prioWeight[d] || 2;
      const share = persons.length;
      persons.forEach(p => {
        if (!stats[p]) stats[p] = { score: 0, tasks: 0, days: 0 };
        stats[p].score += (item.days * w) / share;
        stats[p].tasks += 1 / share;
        stats[p].days += item.days / share;
      });
    });
  });

  const maxScore = Math.max(...Object.values(stats).map(s => s.score), 1);

  // Sort by score descending
  const sorted = Object.entries(stats).sort((a, b) => b[1].score - a[1].score);

  sorted.forEach(([name, s]) => {
    if (s.score === 0) return;
    const row = document.createElement('div');
    row.className = 'wl-row';

    const nameEl = document.createElement('div');
    nameEl.className = 'wl-name';
    nameEl.textContent = name;
    row.appendChild(nameEl);

    const barBg = document.createElement('div');
    barBg.className = 'wl-bar-bg';
    const bar = document.createElement('div');
    bar.className = 'wl-bar';
    const pct = (s.score / maxScore) * 100;
    bar.style.width = pct + '%';

    // Color gradient: green (low load) → yellow → red (high load)
    const ratio = s.score / maxScore;
    if (ratio < 0.5) {
      bar.style.background = `rgb(${Math.round(ratio * 2 * 255)}, 180, 80)`;
    } else {
      bar.style.background = `rgb(255, ${Math.round((1 - ratio) * 2 * 180)}, 80)`;
    }

    bar.textContent = Math.round(s.score);
    barBg.appendChild(bar);
    row.appendChild(barBg);

    const statsEl = document.createElement('div');
    statsEl.className = 'wl-stats';
    statsEl.textContent = `${Math.round(s.tasks)} tasks, ${Math.round(s.days)} days`;
    row.appendChild(statsEl);

    container.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════════════════
// Current Priorities (per-person view)
// ═══════════════════════════════════════════════════════════════════
function renderCurrentPriorities() {
  const tbody = document.getElementById('prio-body');
  tbody.innerHTML = '';

  const prioRank = { H: 0, M: 1, L: 2 };
  const prioColors = { H: ['#FFC7CE','#8b1a1a'], M: ['#FFEB9C','#7a6100'], L: ['#C6EFCE','#1a6b1a'] };
  const now = new Date(); now.setHours(0,0,0,0);

  // For each person, find their current top-priority active task
  const personTasks = {};
  DATA.people.forEach(p => { personTasks[p] = []; });

  DATA.tasks.forEach(group => {
    group.items.forEach(item => {
      const status = item.status || 'on-track';
      if (status === 'done' || status === 'not-needed') return;
      const persons = getPersonArray(item);
      const startDt = parseDate(item.start);
      const endDt = addDays(startDt, item.days);
      // Include tasks that are currently active or upcoming (not yet ended)
      if (endDt <= now && status !== 'delayed') return;
      persons.forEach(p => {
        if (!personTasks[p]) personTasks[p] = [];
        personTasks[p].push({ ...item, _category: group.category, _startDt: startDt, _endDt: endDt });
      });
    });
  });

  // Sort each person's tasks: by priority (H first), then by start date
  DATA.people.forEach(person => {
    const tasks = personTasks[person] || [];
    if (!tasks.length) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td style="font-weight:600">${person}</td><td colspan="7" style="color:#999;font-style:italic">No active tasks</td>`;
      tbody.appendChild(tr);
      return;
    }

    tasks.sort((a, b) => {
      const pa = prioRank[a.priority || a.difficulty || 'M'] ?? 1;
      const pb = prioRank[b.priority || b.difficulty || 'M'] ?? 1;
      if (pa !== pb) return pa - pb;
      return a._startDt - b._startDt;
    });

    // Show top task (current priority) and up to 2 more
    const show = tasks.slice(0, 3);
    show.forEach((task, idx) => {
      const tr = document.createElement('tr');
      const prio = task.priority || task.difficulty || 'M';
      const colors = prioColors[prio] || ['transparent', '#333'];
      const daysLeft = Math.max(0, daysBetween(now, task._endDt));
      const isActive = task._startDt <= now;
      const allPersons = getPersonArray(task).join(', ');

      tr.innerHTML = `
        <td style="font-weight:${idx === 0 ? '700' : '400'}">${idx === 0 ? person : ''}</td>
        <td style="${idx === 0 ? 'font-weight:600' : 'color:#666'}">${task.task}</td>
        <td style="text-align:center;font-size:11px;color:#555">${allPersons}</td>
        <td style="text-align:center;font-family:monospace;font-size:10px;color:#888">${task.id || ''}</td>
        <td style="text-align:center"><span class="prio-badge" style="background:${colors[0]};color:${colors[1]}">${prio}</span></td>
        <td style="font-family:monospace;font-size:11px">${task.start}</td>
        <td style="text-align:center">${isActive ? daysLeft + 'd remaining' : 'starts in ' + daysBetween(now, task._startDt) + 'd'}</td>
        <td style="font-size:11px;color:#666">${task._category}</td>
      `;
      tbody.appendChild(tr);
    });

    if (tasks.length > 3) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td></td><td colspan="7" style="color:#999;font-size:11px;font-style:italic">+ ${tasks.length - 3} more tasks</td>`;
      tbody.appendChild(tr);
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
// Legend & footer
// ═══════════════════════════════════════════════════════════════════
function renderLegend() {
  const legend = document.getElementById('legend');
  const deliveryColor = DATA.categories['Hardware Deliveries'];
  legend.innerHTML = Object.entries(DATA.categories).map(([name, color]) =>
    `<div class="legend-item"><div class="legend-swatch" style="background:${color}"></div>${name}</div>`
  ).join('') +
  (deliveryColor ? `<div class="legend-item"><div class="legend-swatch" style="background:${lighten(deliveryColor)}"></div>Delivery waiting</div>` : '');

  document.getElementById('info').innerHTML =
    '<strong>Effort:</strong> S = Small (&frac12;day) &middot; M = Medium (1-3d) &middot; L = Large (week+)<br>' +
    '<strong>Priority:</strong> H = High (urgent, red) &middot; M = Medium &middot; L = Low (green)';

  const ll = document.getElementById('lines-legend');
  ll.innerHTML = '<span class="ll-swatch" style="background:#00B050"></span> Today &nbsp;&nbsp;' +
    DATA.milestones.map(ms =>
      `<span class="ll-swatch" style="background:${ms.color}"></span> ${ms.label} (${ms.date}) &nbsp;&nbsp;`
    ).join('');

  document.getElementById('footer').textContent =
    'Click any cell to edit • Bars update instantly • Changes auto-saved in browser • Use Save to File to write to disk • ' +
    'Last generated: 2026-04-02 14:35' +
    (localStorage.getItem(STORAGE_KEY) ? ' • ⚠ You have unsaved browser edits (use Save or Reset)' : '');
}

// ═══════════════════════════════════════════════════════════════════
// Persistence (localStorage)
// ═══════════════════════════════════════════════════════════════════
const STORAGE_KEY = 'gantt_data_v2';

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA));
}

function loadLocal() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (!saved) return;
  try {
    const parsed = JSON.parse(saved);
    if (parsed.tasks) DATA.tasks = parsed.tasks;
    if (parsed.title) DATA.title = parsed.title;
    if (parsed.milestones) DATA.milestones = parsed.milestones;
  } catch(e) { /* ignore corrupted data */ }
}

function resetLocal() {
  if (!confirm('Discard all browser edits and reload the original data?')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// ═══════════════════════════════════════════════════════════════════
// Save to File (File System Access API + download fallback)
// ═══════════════════════════════════════════════════════════════════
let fileHandle = null;

async function saveToFile() {
  const jsonStr = JSON.stringify(DATA, null, 2);
  const statusEl = document.getElementById('save-status');

  if ('showSaveFilePicker' in window) {
    try {
      if (!fileHandle) {
        fileHandle = await window.showSaveFilePicker({
          suggestedName: 'gantt_data.json',
          types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
        });
      }
      const writable = await fileHandle.createWritable();
      await writable.write(jsonStr);
      await writable.close();
      showSaveStatus('Saved ✓');
    } catch (err) {
      if (err.name !== 'AbortError') {
        console.error('Save failed:', err);
        showSaveStatus('Save failed');
      }
    }
  } else {
    // Fallback: download
    downloadJSON();
    showSaveStatus('Downloaded ✓');
  }
}

function downloadJSON() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gantt_data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function showSaveStatus(msg) {
  const el = document.getElementById('save-status');
  el.textContent = msg;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// ═══════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════
loadLocal();
render();
window.addEventListener('resize', () => { drawLines(); drawDependencies(); });
document.getElementById('gantt-wrapper').addEventListener('scroll', () => { drawLines(); drawDependencies(); });
</script>
