name: Generate Gantt Chart

on:
  push:
    paths:
      - 'gantt_data.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Gantt HTML
        run: python generate_gantt_html.py

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html gantt.md
          git diff --staged --quiet || git commit -m "Auto-generate Gantt chart from data update"
          git push
